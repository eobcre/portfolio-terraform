name: Deploy Terraform

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  terraform:
    runs-on: ubuntu-latest

    # terraform environment variables
    env:
      TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
      TF_VAR_bucket_name: ${{ secrets.TF_VAR_BUCKET_NAME }}
      TF_VAR_domain_name: ${{ secrets.TF_VAR_DOMAIN_NAME }}
      TF_VAR_api_gateway_invoke_url: ${{ secrets.TF_VAR_API_GATEWAY_INVOKE_URL }}
      TF_VAR_from_email: ${{ secrets.TF_VAR_FROM_EMAIL }}
      TF_VAR_to_email: ${{ secrets.TF_VAR_TO_EMAIL }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ID }}:role/${{ secrets.TERRAFORM_ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve